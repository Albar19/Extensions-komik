name: Build & Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'src/id/**'
      - '.github/workflows/build_repo.yml'
      - '.github/scripts/generate-repo.py'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate signing key
        run: |
          keytool -genkey -v -keystore signingkey.jks \
            -alias repo -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass reposign -keypass reposign \
            -dname "CN=Albar19, OU=Extensions, O=Albar19, L=Jakarta, ST=Jakarta, C=ID"
          keytool -exportcert -keystore signingkey.jks \
            -alias repo -storepass reposign -file repo.crt 2>/dev/null
          SIGNING_FINGERPRINT=$(openssl x509 -in repo.crt -noout -fingerprint -sha256 2>/dev/null | sed 's/.*=//' | tr -d ':')
          echo "SIGNING_FINGERPRINT=$SIGNING_FINGERPRINT" >> $GITHUB_ENV

      - name: Build extensions
        env:
          ALIAS: repo
          KEY_STORE_PASSWORD: reposign
          KEY_PASSWORD: reposign
        run: |
          ./gradlew \
            :src:id:bacakomik:assembleRelease \
            :src:id:doujindesu:assembleRelease \
            :src:id:hentaicrot:assembleRelease \
            :src:id:hwago:assembleRelease \
            :src:id:kiryuu:assembleRelease \
            :src:id:klikmanga:assembleRelease \
            :src:id:komikav:assembleRelease \
            :src:id:komikcast:assembleRelease \
            :src:id:komikdewasa:assembleRelease \
            :src:id:komikindoco:assembleRelease \
            :src:id:komikindoid:assembleRelease \
            :src:id:komikindo:assembleRelease \
            :src:id:komiknesia:assembleRelease \
            :src:id:komikstation:assembleRelease \
            :src:id:komiktap:assembleRelease \
            :src:id:komiku:assembleRelease \
            :src:id:komikzoid:assembleRelease \
            :src:id:kumapoi:assembleRelease \
            :src:id:mangacan:assembleRelease \
            :src:id:mangasusu:assembleRelease \
            :src:id:mangatale:assembleRelease \
            :src:id:mikoroku:assembleRelease \
            :src:id:shinigami:assembleRelease \
            :src:id:tooncubus:assembleRelease \
            :src:id:westmanga:assembleRelease \
            --parallel

      - name: Generate repo index
        run: python .github/scripts/generate-repo.py
        env:
          SIGNING_FINGERPRINT: ${{ env.SIGNING_FINGERPRINT }}

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true