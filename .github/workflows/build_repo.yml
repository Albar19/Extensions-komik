name: Build & Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'src/id/mikoroku/**'
      - '.github/workflows/build_repo.yml'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build extension
        run: ./gradlew :src:id:mikoroku:assembleDebug

      - name: Prepare repo files
        run: |
          mkdir -p repo/apk
          cp src/id/mikoroku/build/outputs/apk/debug/*.apk repo/apk/MikoRoku.apk
          cat > repo/index.min.json << 'EOF'
          [{"name":"MikoRoku","pkg":"eu.kanade.tachiyomi.extension.id.mikoroku","apk":"MikoRoku.apk","lang":"id","code":7,"version":"1.4.07","nsfw":3,"sources":[{"name":"MikoRoku","lang":"id","id":"8593493873810750465","baseUrl":"https://mikoroku.com"}]}]
          EOF

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true
