name: Build & Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'src/id/**'
      - '.github/workflows/build_repo.yml'
      - '.github/scripts/generate-repo.py'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build extensions
        run: |
          ./gradlew \
            :src:id:bacakomik:assembleDebug \
            :src:id:doujindesu:assembleDebug \
            :src:id:hentaicrot:assembleDebug \
            :src:id:hwago:assembleDebug \
            :src:id:kiryuu:assembleDebug \
            :src:id:klikmanga:assembleDebug \
            :src:id:komikav:assembleDebug \
            :src:id:komikcast:assembleDebug \
            :src:id:komikdewasa:assembleDebug \
            :src:id:komikindoco:assembleDebug \
            :src:id:komikindoid:assembleDebug \
            :src:id:komikindo:assembleDebug \
            :src:id:komiknesia:assembleDebug \
            :src:id:komikstation:assembleDebug \
            :src:id:komiktap:assembleDebug \
            :src:id:komiku:assembleDebug \
            :src:id:komikzoid:assembleDebug \
            :src:id:kumapoi:assembleDebug \
            :src:id:mangacan:assembleDebug \
            :src:id:mangasusu:assembleDebug \
            :src:id:mangatale:assembleDebug \
            :src:id:mikoroku:assembleDebug \
            :src:id:shinigami:assembleDebug \
            :src:id:tooncubus:assembleDebug \
            :src:id:westmanga:assembleDebug \
            --parallel

      - name: Generate repo index
        run: python .github/scripts/generate-repo.py

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          force_orphan: true
